spring:
  application:
    name: predictiveedge-api
  datasource:
    url: jdbc:postgresql://localhost:5432/predictiveedge
    username: predictiveedge
    password: predictiveedge
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    com.predictiveedge: INFO
    org.springframework.web: INFO
