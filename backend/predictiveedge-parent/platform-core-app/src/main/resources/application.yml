spring:
  application:
    name: predictiveedge-platform-core
  datasource:
    url: ${PE_DATABASE_URL:jdbc:postgresql://localhost:5432/predictiveedge}
    username: ${PE_DATABASE_USERNAME:predictiveedge}
    password: ${PE_DATABASE_PASSWORD:local-only-change-me}
  data:
    redis:
      host: ${PE_REDIS_HOST:localhost}
      port: ${PE_REDIS_PORT:6379}
      password: ${PE_REDIS_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
predictiveedge:
  identity:
    otp-secret: ${PE_IDENTITY_OTP_SECRET:local-only-change-this-otp-secret-before-production}
    access-token-secret: ${PE_IDENTITY_ACCESS_TOKEN_SECRET:local-only-change-this-access-token-secret}
    otp-minutes: ${PE_IDENTITY_OTP_MINUTES:5}
    otp-max-attempts: ${PE_IDENTITY_OTP_MAX_ATTEMPTS:5}
    access-token-minutes: ${PE_IDENTITY_ACCESS_TOKEN_MINUTES:15}
    email:
      provider: ${PE_EMAIL_PROVIDER:ses}
      from-address: ${PE_SES_FROM_ADDRESS:no-reply@predictiveedge.local}
      region: ${PE_SES_REGION:ap-south-1}
    sms:
      provider: ${PE_SMS_PROVIDER:mock}
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
server:
  port: ${PORT:8080}
  shutdown: graceful
