services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-predictiveedge}
      POSTGRES_USER: ${POSTGRES_USER:-predictiveedge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predictiveedge-local}
    ports:
      - "5432:5432"
    volumes:
      - predictiveedge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-predictiveedge-local}", "--appendonly", "yes"]
    volumes:
      - predictiveedge-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-predictiveedge-local}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  platform-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.platform-core
    environment:
      PE_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-predictiveedge}
      PE_DATABASE_USERNAME: ${POSTGRES_USER:-predictiveedge}
      PE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-predictiveedge-local}
      PE_REDIS_HOST: redis
      PE_REDIS_PORT: 6379
      PE_REDIS_PASSWORD: ${REDIS_PASSWORD:-predictiveedge-local}
      PE_IDENTITY_OTP_SECRET: ${PE_IDENTITY_OTP_SECRET:-local-only-change-this-otp-secret-before-production}
      PE_IDENTITY_ACCESS_TOKEN_SECRET: ${PE_IDENTITY_ACCESS_TOKEN_SECRET:-local-only-change-this-access-token-secret}
      PE_EMAIL_PROVIDER: ${PE_EMAIL_PROVIDER:-ses}
      PE_SES_REGION: ${PE_SES_REGION:-ap-south-1}
      PE_SES_FROM_ADDRESS: ${PE_SES_FROM_ADDRESS:-no-reply@predictiveedge.local}
      PE_SMS_PROVIDER: ${PE_SMS_PROVIDER:-mock}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${PE_SES_REGION:-ap-south-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    depends_on:
      platform-core:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  predictiveedge-postgres-data:
  predictiveedge-redis-data:
